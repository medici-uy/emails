name: Release

permissions:
  id-token: write
  contents: read

on:
  workflow_dispatch:

env:
  DEBUG: ${{ vars.DEBUG }}

jobs:
  release:
    runs-on: ubuntu-26.04-arm

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: latest
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Release
        run: npm publish --access public
